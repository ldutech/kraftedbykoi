<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ===== Page title & description ===== -->
  <title>KOI-Krafted Workshops</title>
  <meta name="description" content="Join KOI-Krafted Workshops — hands-on creative sessions. Tap to view details and register.">

  <!-- ===== Link preview (Open Graph) — controls the image/title shown in iMessage, Instagram, Facebook, LinkedIn, WhatsApp ===== -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kraftedbykoi.com/">
  <meta property="og:title" content="KOI-Krafted Workshops">
  <meta property="og:description" content="Hands-on creative workshops. Tap to view details and register.">
  <meta property="og:image" content="https://kraftedbykoi.com/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- ===== Twitter/X card ===== -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="KOI-Krafted Workshops">
  <meta name="twitter:description" content="Hands-on creative workshops. Tap to view details and register.">
  <meta name="twitter:image" content="https://kraftedbykoi.com/og-image.jpg">

  <!-- ===== Redirect real visitors to Luma =====
       JS runs for humans but NOT for preview scrapers, so scrapers keep YOUR image.
       The meta-refresh below is a fallback if JS is disabled. -->
  <script>
    window.location.replace("https://luma.com/user/lduniversity");
  </script>
  <meta http-equiv="refresh" content="1; url=https://luma.com/user/lduniversity">

  <style>
    html,body{height:100%;margin:0}
    body{
      display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:#ffffff;color:#111;text-align:center;padding:24px;
    }
    .box{max-width:420px}
    .box img{max-width:100%;height:auto;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.12)}
    .box p{margin:20px 0 8px;font-size:16px;color:#444}
    .box a{display:inline-block;margin-top:6px;font-weight:600;color:#0a58ca;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <img src="og-image.jpg" alt="KOI-Krafted Workshops">
    <p>Taking you to registration&hellip;</p>
    <a href="https://luma.com/user/lduniversity">Continue to KOI-Krafted &rarr;</a>
  </div>
</body>
</html>
